<header class="page-header">
  <div class="wrap">
    <a href="../accommodation.html" class="back-link">&larr; All accommodation</a>
    <span class="script-tag">rest &amp;</span>
    <h1>The Driftwood House</h1>
    <p>Pembrokeshire &middot; 26 photos &middot; Shot 2025</p>
  </div>
</header>

<section class="wrap">
  <div class="photo-grid">
    <button class="photo-item" data-full=""><span class="placeholder-label">Photo 1 — replace src in HTML</span></button>
    <button class="photo-item" data-full=""><span class="placeholder-label">Photo 2</span></button>
    <button class="photo-item" data-full=""><span class="placeholder-label">Photo 3</span></button>
    <button class="photo-item" data-full=""><span class="placeholder-label">Photo 4</span></button>
    <button class="photo-item" data-full=""><span class="placeholder-label">Photo 5</span></button>
    <button class="photo-item" data-full=""><span class="placeholder-label">Photo 6</span></button>
  </div>
</section>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">Close ✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
  document.querySelectorAll('.photo-item').forEach(function (item) {
    item.addEventListener('click', function () {
      var full = item.getAttribute('data-full');
      if (!full) return;
      document.getElementById('lightbox-img').src = full;
      document.getElementById('lightbox').classList.add('open');
    });
  });
  function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
  document.getElementById('lightbox').addEventListener('click', function (e) {
    if (e.target.id === 'lightbox') closeLightbox();
  });
</script>

</body>
</html>
